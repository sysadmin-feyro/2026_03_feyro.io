name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.225.219.2
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/feyro_websites/2026_03_feyro_io
            git pull
            npm install --prefer-offline
            npm run build
            echo "--- Build output ---"
            ls -la dist/
            echo "--- nginx config (sites-enabled) ---"
            cat /etc/nginx/sites-enabled/* 2>/dev/null || echo "keine sites-enabled configs"
            echo "--- nginx config (conf.d) ---"
            cat /etc/nginx/conf.d/*.conf 2>/dev/null || echo "keine conf.d configs"
            echo "--- Document Root prüfen ---"
            grep -r "root " /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null || true
            echo "✅ Deploy erfolgreich: $(date)"
